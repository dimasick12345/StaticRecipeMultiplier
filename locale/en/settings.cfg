[mod-setting-name]
srm-multiplier=Static Recipe Multiplier (Recipe multiplier)
srm-ignore-items=Static Recipe Multiplier (Ignored crafting items)

[mod-setting-description]
srm-multiplier=Multiplies the number of ingredients in all recipes, except those containing any ore/raw resource (any planet, any mod).
srm-ignore-items=Comma-separated internal item names (e.g. steel-plate,cooked-fish,plastic-bar). Default: steel plate + cooked fish. If you completely clear this field, the multiplier will also apply to steel plates and cooked fish.
