[mod-setting-name]
srm-multiplier=Static Recipe Multiplier (Множитель рецептов)
srm-ignore-items=Static Recipe Multiplier (Список игнорируемых предметов)

[mod-setting-description]
srm-multiplier=Умножает количество ингредиентов во всех рецептах, кроме тех, где есть хотя бы одна руда (любые планеты, любые моды).
srm-ignore-items=Внутренние имена предметов через запятую (например: steel-plate,cooked-fish,plastic-bar). По умолчанию: стальная балка + приготовленная рыба. Если полностью очистить поле — умножение будет применяться и к стали, и к приготовленной рыбе.
